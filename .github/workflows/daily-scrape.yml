name: Know Ball Daily Scraper
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      recent_days:
        description: "Rolling lookback window for completed matches"
        required: false
        default: "21"
  push:
    branches:
      - main

concurrency:
  group: know-ball-daily-scrape
  cancel-in-progress: false

jobs:
  scrape-and-rate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CURRENT_SEASON: ${{ vars.CURRENT_SEASON }}
      SOFASCORE_SEASON_IDS: ${{ vars.SOFASCORE_SEASON_IDS }}
      # Scan a rolling window so missed/blocked/too-early runs can catch up.
      # Existing matches with player stats are skipped by the pipeline.
      KNOW_BALL_RECENT_DAYS: ${{ github.event.inputs.recent_days || '21' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Run daily pipeline
        run: python -m pipeline.daily
