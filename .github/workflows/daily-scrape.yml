name: Know Ball Daily Scraper
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      recent_days:
        description: "0 = league-season reconciliation; otherwise use a rolling date window"
        required: false
        default: "0"
      full_backfills:
        description: "Run heavyweight full-season backfills"
        required: false
        default: "false"
  push:
    branches:
      - main

concurrency:
  group: know-ball-daily-scrape
  cancel-in-progress: false

jobs:
  scrape-and-rate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CURRENT_SEASON: ${{ vars.CURRENT_SEASON }}
      SOFASCORE_SEASON_IDS: ${{ vars.SOFASCORE_SEASON_IDS }}
      # 0 reconciles each configured league season and only processes
      # matches missing player stats. Non-zero keeps the old date-window mode.
      KNOW_BALL_RECENT_DAYS: ${{ github.event.inputs.recent_days || '0' }}
      KNOW_BALL_FULL_BACKFILLS: ${{ github.event.inputs.full_backfills || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Run daily pipeline
        run: python -m pipeline.daily
